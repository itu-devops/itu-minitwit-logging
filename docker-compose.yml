services:
  minitwitserver:
    restart: unless-stopped
    container_name: minitwit
    build:
      context: minitwit
    ports:
      - "5001:5000"
    networks:
      - main

  minitwitclient:
    restart: unless-stopped
    build:
      context: minitwit_client
    networks:
      - main
    depends_on:
      - minitwitserver

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      # Dozzle needs read-only access to the Docker socket to stream container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    environment:
      # Log level for Dozzle itself (not your application logs)
      DOZZLE_LEVEL: info
    restart: unless-stopped
    networks:
      - main

networks:
  main:
